# GENERATED by tools/mirror-satellites.sh — edit there, not here.
name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reset the rolling nightly prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete nightly --yes --cleanup-tag || true
          {
            printf '## Nightly build `%s`\n\n' "${GITHUB_SHA:0:7}"
            printf 'Rolling **nightly** build of `ryu-teams` from `main` — not a stable release.\n\n'
            printf 'Built from commit %s.\n\n' "${GITHUB_SHA}"
            printf 'Installed Ryu nodes never auto-update onto rolling builds; the updater only\n'
            printf 'tracks the latest tagged v* release. Use the tagged releases for anything real.\n'
          } > notes.md
          gh release create nightly --prerelease --target "$GITHUB_SHA" \
            --title "Nightly (${GITHUB_SHA:0:7})" --notes-file notes.md

  build:
    needs: prepare
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Build
        run: cargo build --release --manifest-path backend/Cargo.toml
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          case "${{ runner.os }}" in
            Linux)   plat="linux-x86_64" ;;
            macOS)   plat="macos-aarch64" ;;
            Windows) plat="windows-x86_64" ;;
          esac
          mkdir -p dist
          cp "backend/target/release/ryu-teams${ext}" "dist/ryu-teams-${plat}${ext}"
          ( cd dist
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "ryu-teams-${plat}${ext}" > "ryu-teams-${plat}${ext}.sha256"
            elif command -v shasum >/dev/null 2>&1; then shasum -a 256 "ryu-teams-${plat}${ext}" > "ryu-teams-${plat}${ext}.sha256"; fi )
      - name: Upload to nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: false
