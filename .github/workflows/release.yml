# GENERATED by tools/mirror-satellites.sh — edit there, not here.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.6)'
        required: true

permissions:
  contents: write

jobs:
  notes:
    name: Release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          # The changelog diffs against the previous tag — needs full history.
          fetch-depth: 0
      - name: Publish release with standardized notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # Notes are built into a file rather than passed as a multi-line
          # --notes string: inside a `run: |` block scalar EVERY line must stay
          # indented, and a quoted string continuing at column 0 silently ends
          # the block and makes the whole workflow file invalid.
          if [ -f scripts/release-notes.mjs ]; then
            node scripts/release-notes.mjs --tag "$TAG" --channel release --repo "$GITHUB_REPOSITORY" > release-notes.md
          else
            {
              printf '## %s\n\n' "$TAG"
              printf '`%s` at %s.\n\n' "teams" "$TAG"
              printf 'Binaries for every platform are attached to this release.\n'
              printf 'Ryu as a whole lives at https://github.com/amajorai/ryu.\n'
            } > release-notes.md
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "ryu-teams $TAG" --target "$GITHUB_SHA" --notes-file release-notes.md
          fi

  build:
    needs: notes
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      # The app's unit/integration tests ship WITH the satellite (colocated in
      # backend/src + backend/tests), so the satellite gates its own artifact.
      # --release reuses the build step's profile so the cache serves both.
      - name: Test
        run: cargo test --release --manifest-path backend/Cargo.toml
      - name: Build
        run: cargo build --release --manifest-path backend/Cargo.toml
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          case "${{ runner.os }}" in
            Linux)   plat="linux-x86_64" ;;
            macOS)   plat="macos-aarch64" ;;
            Windows) plat="windows-x86_64" ;;
          esac
          mkdir -p dist
          cp "backend/target/release/ryu-teams${ext}" "dist/ryu-teams-${plat}${ext}"
          ( cd dist
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "ryu-teams-${plat}${ext}" > "ryu-teams-${plat}${ext}.sha256"
            elif command -v shasum >/dev/null 2>&1; then shasum -a 256 "ryu-teams-${plat}${ext}" > "ryu-teams-${plat}${ext}.sha256"; fi )
      # gh release upload, NOT softprops: softprops PATCHes the release even
      # when it is only ADDING assets, and that PATCH is refused for the App
      # token ("Resource not accessible by integration") despite Contents:
      # write. The assets endpoint on its own is permitted.
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no files matched" >&2; exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
